<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love Mummy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffecd2);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: pop 0.8s ease;
    }

    h1 {
      font-size: 5rem;
      color: #c0392b;
      text-shadow: 3px 3px 10px rgba(192, 57, 43, 0.3);
      letter-spacing: 2px;
    }

    .heart {
      font-size: 6rem;
      display: inline-block;
      animation: beat 1s infinite;
    }

    .subtitle {
      margin-top: 20px;
      font-size: 1.5rem;
      color: #e74c3c;
      opacity: 0.8;
    }

    /* floating hearts */
    .floaters span {
      position: fixed;
      font-size: 2rem;
      animation: float linear infinite;
      opacity: 0.6;
      pointer-events: none;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.2); }
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes float {
      0%   { bottom: -10%; opacity: 0.8; }
      100% { bottom: 110%; opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="floaters" id="floaters"></div>

  <div class="container">
    <div class="heart">❤️</div>
    <h1>I Love Mummy !!!</h1>
    <p class="subtitle">Forever and always 💖</p>
  </div>

  <script>
    const floaters = document.getElementById('floaters');
    const emojis = ['❤️', '💖', '💕', '💗', '🌸', '💝'];

    function spawnHeart() {
      const span = document.createElement('span');
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + 'vw';
      span.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
      const duration = 4 + Math.random() * 4;
      span.style.animation = `float ${duration}s linear forwards`;
      floaters.appendChild(span);
      setTimeout(() => span.remove(), duration * 1000);
    }

    setInterval(spawnHeart, 600);
  </script>

</body>
</html>
